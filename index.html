<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETF 大數據監控面板</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #38bdf8;
            --accent-green: #34d399;
            --accent-red: #fb7185;
            --border-color: #334155;
        }
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            padding: 20px;
        }
        .dashboard-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            height: 100%;
            transition: transform 0.2s;
        }
        .dashboard-card:hover {
            transform: translateY(-2px);
        }
        .nav-tabs {
            border-bottom: 2px solid var(--border-color);
        }
        .nav-link {
            color: var(--text-muted);
            border: none !important;
            padding: 10px 20px;
            font-weight: 500;
        }
        .nav-link.active {
            color: var(--accent-blue) !important;
            background-color: transparent !important;
            border-bottom: 3px solid var(--accent-blue) !important;
        }
        .table {
            color: var(--text-main);
            vertical-align: middle;
        }
        .table th {
            color: var(--text-muted);
            border-bottom-color: var(--border-color);
            font-weight: 500;
        }
        .table td {
            border-bottom-color: rgba(51, 65, 85, 0.5);
        }
        .badge-up { background-color: rgba(251, 113, 133, 0.15); color: var(--accent-red); }
        .badge-down { background-color: rgba(52, 211, 153, 0.15); color: var(--accent-green); }
        .search-box {
            background-color: #0f172a;
            border: 1px solid var(--border-color);
            color: var(--text-main);
        }
        .search-box:focus {
            background-color: #0f172a;
            border-color: var(--accent-blue);
            color: var(--text-main);
            box-shadow: none;
        }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold mb-1"><i class="bi bi-graph-up-arrow text-info me-2"></i>ETF 籌碼大數據監控面板</h2>
            <p class="text-muted small mb-0">真實數據交叉比對與多維度分析</p>
        </div>
        <div class="text-end">
            <span class="badge bg-secondary p-2" id="updateTimeBadge">數據載入中...</span>
        </div>
    </div>

    <ul class="nav nav-tabs mb-4" id="dashboardTabs" role="tablist">
        <li class="nav-item">
            <button class="nav-link active" id="overview-tab" data-bs-toggle="tab" data-bs-target="#overview">整體總覽</button>
        </li>
        <li class="nav-item">
            <button class="nav-link" id="trust-tab" data-bs-toggle="tab" data-bs-target="#trust">投信追蹤</button>
        </li>
        <li class="nav-item">
            <button class="nav-link" id="foreign-tab" data-bs-toggle="tab" data-bs-target="#foreign">外資追蹤</button>
        </li>
    </ul>

    <div class="tab-content" id="dashboardTabContent">
        <div class="tab-pane fade show active" id="overview">
            <div class="row g-4 mb-4">
                <div class="col-md-4">
                    <div class="dashboard-card text-center">
                        <h6 class="text-muted mb-2">本日追蹤 ETF 總數</h6>
                        <h2 class="fw-bold text-info" id="totalEtfs">-</h2>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="dashboard-card text-center">
                        <h6 class="text-muted mb-2">投信淨買超最大 ETF</h6>
                        <h2 class="fw-bold text-danger" id="topTrustBuy">-</h2>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="dashboard-card text-center">
                        <h6 class="text-muted mb-2">外資淨買超最大 ETF</h6>
                        <h2 class="fw-bold text-warning" id="topForeignBuy">-</h2>
                    </div>
                </div>
            </div>

            <div class="row g-4">
                <div class="col-lg-8">
                    <div class="dashboard-card">
                        <h5 class="fw-bold mb-3">三大法人大數據對比圖</h5>
                        <div style="height: 300px;"><canvas id="overviewChart"></canvas></div>
                    </div>
                </div>
                <div class="col-lg-4">
                    <div class="dashboard-card">
                        <h5 class="fw-bold mb-3">市場即時數據看板</h5>
                        <div class="input-group mb-3">
                            <span class="input-group-text search-box"><i class="bi bi-search text-muted"></i></span>
                            <input type="text" id="quickSearch" class="form-control search-box" placeholder="輸入代號或名稱搜尋...">
                        </div>
                        <div class="table-responsive" style="max-height: 250px; overflow-y: auto;">
                            <table class="table table-hover table-sm">
                                <thead>
                                    <tr>
                                        <th>代號</th>
                                        <th>名稱</th>
                                        <th class="text-end">收盤價</th>
                                    </tr>
                                </thead>
                                <tbody id="miniTableBody">
                                    </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="tab-pane fade" id="trust">
            <div class="dashboard-card">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="fw-bold mb-0"><i class="bi bi-building text-danger me-2"></i>投信每日買賣超明細</h5>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>代號</th>
                                <th>名稱</th>
                                <th class="text-end">投信買進(張)</th>
                                <th class="text-end">投信賣出(張)</th>
                                <th class="text-end">投信淨買超(張)</th>
                            </tr>
                        </thead>
                        <tbody id="trustTableBody">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="tab-pane fade" id="foreign">
            <div class="dashboard-card">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="fw-bold mb-0"><i class="bi bi-globe text-warning me-2"></i>外資每日買賣超明細</h5>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>代號</th>
                                <th>名稱</th>
                                <th class="text-end">外資買進(張)</th>
                                <th class="text-end">外資賣出(張)</th>
                                <th class="text-end">外資淨買超(張)</th>
                            </tr>
                        </thead>
                        <tbody id="foreignTableBody">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // ==============================================================================
    // 核心數據接口：改由全域視窗變數接收 Python 注入的真實資料
    // 如果 Python 還沒塞資料過來，就先預設為空陣列
    // ==============================================================================
    let etfDailyData = window.etfDailyData || [];
    let myChart = null;

    // 數據初始化與渲染發動機
    function initDashboard() {
        if (!etfDailyData || etfDailyData.length === 0) {
            console.log("正在等待 Python 傳遞真實的 ETF 籌碼數據...");
            return;
        }

        // 1. 設定動態更新時間（抓取資料中第一筆的日期，若無則顯示今日）
        const sampleDate = etfDailyData[0]?.date || etfDailyData[0]?.Date || new Date().toLocaleDateString();
        document.getElementById('updateTimeBadge').innerText = `數據觀測日期: ${sampleDate}`;

        // 2. 渲染上方三張統計圖卡
        renderSummaryCards();

        // 3. 建立三大法人對比圖表 (Chart.js)
        renderChart();

        // 4. 渲染三大分頁表格
        renderTables();
    }

    function renderSummaryCards() {
        document.getElementById('totalEtfs').innerText = `${etfDailyData.length} 檔`;

        // 計算投信與外資的最高淨買超
        let topTrust = { code: '-', name: '-', net: -Infinity };
        let topForeign = { code: '-', name: '-', net: -Infinity };

        etfDailyData.forEach(item => {
            // 兼容大小寫欄位
            const code = item.code || item.Code || '';
            const name = item.name || item.Name || '';
            const tBuy = Number(item.trust_buy || item.Trust_Buy || 0);
            const tSell = Number(item.trust_sell || item.Trust_Sell || 0);
            const fBuy = Number(item.foreign_buy || item.Foreign_Buy || 0);
            const fSell = Number(item.foreign_sell || item.Foreign_Sell || 0);

            const tNet = tBuy - tSell;
            const fNet = fBuy - fSell;

            if (tNet > topTrust.net) topTrust = { code, name, net: tNet };
            if (fNet > topForeign.net) topForeign = { code, name, net: fNet };
        });

        document.getElementById('topTrustBuy').innerText = topTrust.net > 0 ? `${topTrust.code} (+${Math.round(topTrust.net)})` : '無買超';
        document.getElementById('topForeignBuy').innerText = topForeign.net > 0 ? `${topForeign.code} (+${Math.round(topForeign.net)})` : '無買超';
    }

    function renderChart() {
        const ctx = document.getElementById('overviewChart').getContext('2d');
        
        // 擷取前 8 檔進行視覺化對比，避免圖表過度擁擠
        const chartData = etfDailyData.slice(0, 8);
        
        const labels = chartData.map(d => (d.name || d.Name || '').substring(0, 6));
        const trustNetData = chartData.map(d => Number(d.trust_buy || d.Trust_Buy || 0) - Number(d.trust_sell || d.Trust_Sell || 0));
        const foreignNetData = chartData.map(d => Number(d.foreign_buy || d.Foreign_Buy || 0) - Number(d.foreign_sell || d.Foreign_Sell || 0));

        if (myChart) myChart.destroy(); // 避免重複渲染造成的重疊 Bug

        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: '投信淨買超(張)',
                        data: trustNetData,
                        backgroundColor: 'rgba(251, 113, 133, 0.7)',
                        borderColor: '#fb7185',
                        borderWidth: 1
                    },
                    {
                        label: '外資淨買超(張)',
                        data: foreignNetData,
                        backgroundColor: 'rgba(253, 224, 71, 0.7)',
                        borderColor: '#fde047',
                        borderWidth: 1
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { labels: { color: '#94a3b8' } }
                },
                scales: {
                    x: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' } },
                    y: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' } }
                }
            }
        });
    }

    function renderTables() {
        const miniBody = document.getElementById('miniTableBody');
        const trustBody = document.getElementById('trustTableBody');
        const foreignBody = document.getElementById('foreignTableBody');

        miniBody.innerHTML = '';
        trustBody.innerHTML = '';
        foreignBody.innerHTML = '';

        etfDailyData.forEach(item => {
            const code = item.code || item.Code || '';
            const name = item.name || item.Name || '';
            const price = item.close_price || item.Close_Price || item.price || '-';
            
            const tBuy = Number(item.trust_buy || item.Trust_Buy || 0);
            const tSell = Number(item.trust_sell || item.Trust_Sell || 0);
            const tNet = tBuy - tSell;

            const fBuy = Number(item.foreign_buy || item.Foreign_Buy || 0);
            const fSell = Number(item.foreign_sell || item.Foreign_Sell || 0);
            const fNet = fBuy - fSell;

            // 1. 右側即時小看板
            miniBody.innerHTML += `
                <tr class="mini-row" data-keyword="${code}${name}">
                    <td><span class="text-info font-monospace">${code}</span></td>
                    <td><small>${name}</small></td>
                    <td class="text-end fw-bold">${price}</td>
                </tr>
            `;

            // 2. 投信詳細表格
            const tNetClass = tNet >= 0 ? 'text-danger fw-bold' : 'text-success fw-bold';
            const tNetSign = tNet >= 0 ? `+${Math.round(tNet)}` : `${Math.round(tNet)}`;
            trustBody.innerHTML += `
                <tr>
                    <td><span class="text-info font-monospace">${code}</span></td>
                    <td>${name}</td>
                    <td class="text-end">${Math.round(tBuy)}</td>
                    <td class="text-end">${Math.round(tSell)}</td>
                    <td class="text-end ${tNetClass}">${tNetSign}</td>
                </tr>
            `;

            // 3. 外資詳細表格
            const fNetClass = fNet >= 0 ? 'text-danger fw-bold' : 'text-success fw-bold';
            const fNetSign = fNet >= 0 ? `+${Math.round(fNet)}` : `${Math.round(fNet)}`;
            foreignBody.innerHTML += `
                <tr>
                    <td><span class="text-info font-monospace">${code}</span></td>
                    <td>${name}</td>
                    <td class="text-end">${Math.round(fBuy)}</td>
                    <td class="text-end">${Math.round(fSell)}</td>
                    <td class="text-end ${fNetClass}">${fNetSign}</td>
                </tr>
            `;
        });
    }

    // 關鍵字快速搜尋功能
    document.getElementById('quickSearch').addEventListener('input', function(e) {
        const query = e.target.value.toLowerCase();
        document.querySelectorAll('.mini-row').forEach(row => {
            const keyword = row.getAttribute('data-keyword').toLowerCase();
            if(keyword.includes(query)) {
                row.style.display = '';
            } else {
                row.style.display = 'none';
            }
        });
    });

    // 網頁加載完畢後，先嘗試初始化一次
    document.addEventListener("DOMContentLoaded", initDashboard);

    // 開放一個外部監聽接口，讓 Streamlit 在非同步傳入資料時能即時重新驅動網頁
    window.updateDataAndRender = function(newData) {
        etfDailyData = newData;
        initDashboard();
    };
</script>
</body>
</html>
